<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f3460 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(148,163,184,0.15) 1px, transparent 0);
    background-size: 40px 40px;
  }
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20,184,166,0.15) 0%, transparent 70%);
    top: -100px;
    right: -100px;
  }
  .glow2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.08) 0%, transparent 70%);
    bottom: -100px;
    left: -50px;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    width: 100%;
  }
  .avatar {
    width: 160px;
    height: 160px;
    border-radius: 24px;
    background: linear-gradient(135deg, #34d399, #0d9488);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
  }
  .info { flex: 1; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    color: #fbbf24;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .name {
    font-size: 58px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .name span { color: #fbbf24; }
  .title {
    font-size: 22px;
    color: #94a3b8;
    font-weight: 500;
    margin-bottom: 28px;
  }
  .tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
  }
  .url {
    position: absolute;
    bottom: 32px;
    right: 80px;
    color: #475569;
    font-size: 14px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="avatar">SP</div>
    <div class="info">
      <div class="badge">&#9679; Available for Engagements</div>
      <div class="name">Sagar <span>Pandey</span></div>
      <div class="title">Solution Architect — Cloud · M365 · AI/ML</div>
      <div class="tags">
        <span class="tag">Azure</span>
        <span class="tag">Microsoft 365</span>
        <span class="tag">AI / ML</span>
        <span class="tag">Node.js</span>
        <span class="tag">React</span>
        <span class="tag">15+ Years</span>
      </div>
    </div>
  </div>
  <div class="url">sagarpandey88.github.io</div>
</body>
</html>
